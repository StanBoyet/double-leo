<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Doubling Leo</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #0e0e10;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      box-sizing: border-box;
      gap: 20px;
    }

    header {
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .date {
      margin-top: 6px;
      font-size: clamp(12px, 1.4vw, 14px);
      color: #8a8a92;
      font-variant-numeric: tabular-nums;
    }

    canvas {
      max-width: min(100%, 900px);
      height: auto;
      display: block;
      border-radius: 6px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1 id="title">Day … - Revente &amp; PC repair</h1>
      <div class="date" id="subtitle"></div>
    </header>
    <canvas id="stage"></canvas>
  </main>

  <script>
    const DAY_ZERO = new Date(2026, 3, 20);

    function daysSince(zero) {
      const now = new Date();
      const a = Date.UTC(zero.getFullYear(), zero.getMonth(), zero.getDate());
      const b = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
      return Math.max(0, Math.floor((b - a) / 86400000));
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function render(img, n) {
      const W = img.naturalWidth;
      const H = img.naturalHeight;

      const stage = document.getElementById('stage');
      stage.width = W;
      stage.height = H;
      const ctx = stage.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      const cols = Math.pow(2, Math.ceil(n / 2));
      const rows = Math.pow(2, Math.floor(n / 2));

      const tileW = W / cols;
      const tileH = tileW * (H / W);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.drawImage(img, c * tileW, r * tileH, tileW, tileH);
        }
      }
    }

    const n = daysSince(DAY_ZERO);
    document.getElementById('title').textContent = `Day ${n} - Revente & PC repair`;
    document.getElementById('subtitle').textContent = formatDate(new Date());

    const img = new Image();
    img.onload = () => render(img, n);
    img.onerror = () => {
      document.getElementById('subtitle').textContent += ' — failed to load leo.jpg';
    };
    img.src = './leo.jpg';
  </script>
</body>

</html>
