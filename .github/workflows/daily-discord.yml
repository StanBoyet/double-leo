name: Daily Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  DAY_ZERO: "2026-04-20"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Render today.png
        run: node scripts/render.js

      - name: Commit today.png if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add today.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update today.png"
            git push
          fi

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ZERO=$(date -u -d "${DAY_ZERO}" +%s)
          NOW=$(date -u +%s)
          DAYS=$(( (NOW - ZERO) / 86400 ))
          if [ "$DAYS" -lt 0 ]; then DAYS=0; fi
          PAYLOAD=$(jq -nc --arg content "🧑 **Day ${DAYS}** — Revente & PC repair
          https://stanboyet.github.io/double-leo/" '{content: $content}')
          curl -fsS -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
